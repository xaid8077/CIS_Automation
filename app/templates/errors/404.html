<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>404 — CIS Automation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#171b26;--border:#2c3349;--accent:#4f8fff;--text:#e4e9f4;--text-3:#565e78;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center}
.box{text-align:center;padding:40px}.code{font-family:var(--mono);font-size:64px;font-weight:600;color:var(--accent);line-height:1}
.msg{font-size:18px;font-weight:600;margin:12px 0 6px}.sub{font-size:13px;color:var(--text-3);margin-bottom:24px}
a{font-family:var(--mono);font-size:12px;color:var(--accent);text-decoration:none;border:1px solid var(--border);padding:7px 16px;border-radius:7px;transition:border-color .15s}
a:hover{border-color:var(--accent)}
</style></head>
<body><div class="box">
<div class="code">404</div>
<div class="msg">Page Not Found</div>
<div class="sub">The page you're looking for doesn't exist.</div>
<a href="/">← Back to home</a></div></body></html>
